apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  namespace: event-pipeline
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set local http://minio:9000 "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"; do
                sleep 2
              done
              mc mb local/event-archive --ignore-existing
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: event-pipeline-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: event-pipeline-secrets
                  key: MINIO_SECRET_KEY
