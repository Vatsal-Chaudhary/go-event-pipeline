apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service
  namespace: event-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query-service
  template:
    metadata:
      labels:
        app: query-service
    spec:
      containers:
        - name: query-service
          image: vatsaldock/query-service:v2
          ports:
            - containerPort: 3002
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: event-pipeline-secrets
                  key: DB_URL
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: event-pipeline-config
                  key: QUERY_PORT
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 10
